name: grc
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  digify_grc_suite:
    git:
      url: https://github.com/hananmalik21/grc_suite.git
      ref: main

  digify_enterprise_structure:
    git:
      url: https://github.com/hananmalik21/digify_enterprise_structure.git
      ref: main

  digify_security_console:
    git:
      url: https://github.com/hananmalik21/digify_security_console.git
      ref: main

  flutter_riverpod: ^2.6.1
  go_router: ^17.2.3
  dio: ^5.4.0

  cupertino_icons: ^1.0.8
  flutter_screenutil: ^5.9.3
  flutter_spinkit: ^5.2.2
  flutter_svg: ^2.2.3
  google_fonts: ^8.1.0
  reorderables: ^0.6.0
  flutter_staggered_grid_view: ^0.7.0

  archive: ^4.0.2
  geolocator: ^14.0.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: any
  url_launcher: ^6.3.2
  skeletonizer: ^2.1.2
  flutter_colorpicker: ^1.1.0
  pull_down_button: ^0.10.2
  dropdown_button2: ^3.1.0
  dotted_border: ^3.1.0
  gap: ^3.0.1
  fl_chart: ^1.2.0
  file_picker: ^11.0.2
  image_picker: ^1.1.2
  camera: ^0.12.0+1
  syncfusion_flutter_datepicker: ^33.2.8
  super_tooltip: ^2.1.1
  country_code_picker: ^3.4.1

  vector_graphics: any
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  build_runner: ^2.4.9
  flutter_gen_runner: ^5.4.0
  flutter_lints: ^6.0.0

flutter_gen:
  output: lib/gen/
  line_length: 120
  integrations:
    flutter_svg: true
  assets:
    enabled: true
    outputs:
      class_name: Assets

flutter:
  uses-material-design: true
  generate: true
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter/static/Inter_18pt-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Inter/static/Inter_18pt-Light.ttf
          weight: 300
        - asset: assets/fonts/Inter/static/Inter_18pt-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter/static/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter/static/Inter_18pt-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter/static/Inter_18pt-Bold.ttf
          weight: 700
        - asset: assets/fonts/Inter/static/Inter_18pt-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Inter/static/Inter_18pt-Italic.ttf
          weight: 400
          style: italic
        - asset: assets/fonts/Inter/static/Inter_18pt-MediumItalic.ttf
          weight: 500
          style: italic
        - asset: assets/fonts/Inter/static/Inter_18pt-SemiBoldItalic.ttf
          weight: 600
          style: italic
        - asset: assets/fonts/Inter/static/Inter_18pt-BoldItalic.ttf
          weight: 700
          style: italic
  assets:
    - assets/favicon/
    - assets/icons/header/
    - assets/logo/
    - assets/icons/
    - assets/icons/auth/
    - assets/icons/payroll/
    - assets/icons/developer_tools/
    - assets/icons/enterprise_structure/
    - assets/icons/workforce/
    - assets/icons/sidebar/
    - assets/icons/time_management/
    - assets/icons/security_manager/
    - assets/icons/leave_management/
    - assets/icons/employee_management/
    - assets/icons/employee_self_service/
    - assets/icons/attendance/
    - assets/icons/compensation/
    - assets/icons/hiring/
    - assets/grc/figma/
    - assets/grc/figma/dashboard/
    - assets/grc/figma/dashboard/svg/
    - assets/grc/figma/library/svg/
    - assets/grc/figma/assets/svg/
    - assets/grc/figma/risks/svg/
    - assets/grc/figma/assessments/svg/
    - assets/grc/figma/controls/svg/
    - assets/grc/figma/tprm/svg/
    - assets/grc/figma/programs/svg/
    - assets/grc/figma/review_progress/svg/
    - assets/grc/figma/roles/svg/
    - assets/grc/figma/common/svg/
